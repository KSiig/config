---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Stat VSCode user-file symlinks
      stat:
        path: "/tmp/vscode-User/{{ item }}"
      loop:
        - settings.json
        - keybindings.json
        - tasks.json
      register: vscode_user_links

    - name: VSCode user files are symlinks that resolve
      assert:
        that:
          - item.stat.exists
          - item.stat.islnk
      loop: "{{ vscode_user_links.results }}"
      loop_control:
        label: "{{ item.item }}"
