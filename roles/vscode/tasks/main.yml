---
- name: Set VSCode user dir (macOS)
  set_fact:
    vscode_user_dir: "{{ ansible_env.HOME }}/Library/Application Support/Code/User"
  when:
    - vscode_user_dir is not defined
    - ansible_system == "Darwin"

- name: Check for WSL Windows mount
  stat:
    path: /mnt/c/Users
  register: vscode_wsl_mount
  when:
    - vscode_user_dir is not defined
    - ansible_system == "Linux"

- name: Set VSCode user dir (WSL -> Windows host)
  set_fact:
    vscode_user_dir: "/mnt/c/Users/{{ vscode_windows_user }}/AppData/Roaming/Code/User"
  when:
    - vscode_user_dir is not defined
    - ansible_system == "Linux"
    - vscode_wsl_mount.stat.exists | default(false)

- name: Install VSCode settings
  when: vscode_user_dir is defined
  block:
    - name: Ensure VSCode user directory exists
      file:
        path: "{{ vscode_user_dir }}"
        state: directory

    - name: Link VSCode user files
      file:
        src: "{{ role_path }}/files/{{ item }}"
        dest: "{{ vscode_user_dir }}/{{ item }}"
        state: link
        force: true
      loop:
        - settings.json
        - keybindings.json
        - tasks.json

- name: Install VSCode extensions
  when:
    - vscode_user_dir is defined
    - vscode_extensions | length > 0
  block:
    - name: Locate VSCode CLI
      command: which code
      register: vscode_cli
      changed_when: false
      failed_when: false

    - name: List installed VSCode extensions
      command: code --list-extensions
      register: vscode_installed_ext
      changed_when: false
      when: vscode_cli.rc == 0

    - name: Install missing VSCode extensions
      command: "code --install-extension {{ item }} --force"
      loop: "{{ vscode_extensions }}"
      when:
        - vscode_cli.rc == 0
        - item | lower not in (vscode_installed_ext.stdout_lines | default([]) | map('lower') | list)

    - name: Warn if VSCode CLI is missing
      debug:
        msg: >-
          `code` not on PATH; skipping extension install. In VSCode run
          "Shell Command: Install 'code' command in PATH" from the command palette.
      when: vscode_cli.rc != 0

- name: Skip vscode role when no target platform detected
  debug:
    msg: "Skipping vscode role: not macOS and /mnt/c/Users not present."
  when: vscode_user_dir is not defined
