---
- name: Update apt cache
  apt:
    update_cache: true
  become: true

- name: Install dependencies
  package:
    name: "{{ item }}"
    state: present
  become: true
  with_items: "{{ neovim_dependencies }}"

- name: Install Neovim PPA
  apt_repository:
    repo: "{{ neovim_ppa }}"
    update_cache: true
  become: true
  when: ansible_distribution_version is version("26.04", "<")

- name: Install Neovim
  apt:
    name: "{{ neovim_name }}"
  become: true
