---
- name: Update apt cache
  apt:
    update_cache: true
  become: true

- name: Install dependencies
  package:
    name: "{{ item }}"
    state: present
  become: true
  with_items: "{{ neovim_dependencies }}"

- name: Install Neovim PPA
  apt_repository:
    repo: "{{ neovim_ppa }}"
    update_cache: true
    codename: buster
  become: true

- name: Install Neovim
  apt:
    name: "{{ neovim_name }}"
  become: true
