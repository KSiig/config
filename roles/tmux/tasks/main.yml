---
- name: Update apt cache (Debian-family)
  apt:
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install Git
  package:
    name: "git"
    state: present
  become: "{{ ansible_os_family != 'Darwin' }}"

- name: Install Tmux
  package:
    name: "{{ tmux_name }}"
    state: present
  become: "{{ ansible_os_family != 'Darwin' }}"

- name: Check if folder exists
  stat:
    path: "{{ repo_dest }}"
  register: file_details

- name: Clone Tmux Config
  git:
    repo: "{{ repo_clone_url }}"
    dest: "{{ repo_dest }}"
    version: "{{ repo_version }}"
  when: not file_details.stat.exists

- name: Create symlink to .tmux.conf
  file:
    src: "{{ tmux_conf_src }}"
    dest: "{{ tmux_conf_dest }}"
    state: link

- name: Create symlink to .tmux.conf.local
  file:
    src: "{{ tmux_conf_local_src }}"
    dest: "{{ tmux_conf_dest }}.local"
    state: link
    force: true
